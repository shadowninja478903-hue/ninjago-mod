name: Build Ninjago Mod

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Gradle 8.8
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.8-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          echo "/opt/gradle/gradle-8.8/bin" >> $GITHUB_PATH

      - name: Build
        run: |
          BUILD_FILE=$(find . -name "build.gradle" -not -path "*/.gradle/*" -not -path "*/build/*" | head -1)
          BUILD_DIR=$(dirname "$BUILD_FILE")
          cd "$BUILD_DIR"
          gradle wrapper --gradle-version=8.8
          chmod +x gradlew
          ./gradlew build --no-daemon
        env:
          GRADLE_OPTS: "-Xmx3g"

      - name: Inject toml into JAR
        run: |
          JAR=$(find . -name "ninjago-*.jar" -path "*/build/libs/*" | head -1)
          PROPS=$(find . -name "gradle.properties" | grep -v ".gradle/" | head -1)
          MOD_ID=$(grep "^mod_id=" "$PROPS" | cut -d= -f2)
          MOD_VER=$(grep "^mod_version=" "$PROPS" | cut -d= -f2)
          MOD_LIC=$(grep "^mod_license=" "$PROPS" | cut -d= -f2)
          MOD_NAME=$(grep "^mod_name=" "$PROPS" | cut -d= -f2)
          echo "JAR=$JAR MOD_ID=$MOD_ID MOD_VER=$MOD_VER"
          mkdir -p /tmp/inject/META-INF
          printf 'modLoader = "javafml"\nloaderVersion = "[1,)"\nlicense = "%s"\n\n[[mods]]\n    modId = "%s"\n    version = "%s"\n    displayName = "%s"\n    description = "Ninjago Elemental Weapons Mod"\n\n    [[dependencies.%s]]\n        modId = "neoforge"\n        type = "required"\n        versionRange = "[21.1,)"\n        ordering = "NONE"\n        side = "BOTH"\n\n    [[dependencies.%s]]\n        modId = "minecraft"\n        type = "required"\n        versionRange = "[1.21.1,1.22)"\n        ordering = "NONE"\n        side = "BOTH"\n' "$MOD_LIC" "$MOD_ID" "$MOD_VER" "$MOD_NAME" "$MOD_ID" "$MOD_ID" > /tmp/inject/META-INF/neoforge.mods.toml
          echo "=== toml ==="
          cat /tmp/inject/META-INF/neoforge.mods.toml
          cd /tmp/inject
          zip -ur "$OLDPWD/$JAR" META-INF/
          echo "Injected!"

      - name: Inject assets into JAR
        run: |
          JAR=$(find . -name "ninjago-*.jar" -path "*/build/libs/*" | head -1)
          RES=$(find . -type d -name "resources" -path "*/main/*" | head -1)
          echo "Resources: $RES"
          mkdir -p /tmp/assets_inject
          cp "$RES/pack.mcmeta" /tmp/assets_inject/ 2>/dev/null || true
          cp -r "$RES/assets" /tmp/assets_inject/ 2>/dev/null || true
          cd /tmp/assets_inject
          zip -ur "$OLDPWD/$JAR" . 2>/dev/null || true
          echo "Assets injected!"

      - name: Verify
        run: |
          JAR=$(find . -name "ninjago-*.jar" -path "*/build/libs/*" | head -1)
          echo "=== neoforge.mods.toml in JAR ==="
          unzip -p "$JAR" META-INF/neoforge.mods.toml

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: ninjago-mod-jar
          path: "**/build/libs/ninjago-*.jar"
          if-no-files-found: error
