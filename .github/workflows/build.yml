name: Build Ninjago Mod

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Gradle 8.8
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.8-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          echo "/opt/gradle/gradle-8.8/bin" >> $GITHUB_PATH

      - name: Build
        run: |
          BUILD_FILE=$(find . -name "build.gradle" -not -path "*/.gradle/*" -not -path "*/build/*" | head -1)
          BUILD_DIR=$(dirname "$BUILD_FILE")
          cd "$BUILD_DIR"
          gradle wrapper --gradle-version=8.8
          chmod +x gradlew
          ./gradlew build --no-daemon
        env:
          GRADLE_OPTS: "-Xmx3g"

      - name: Inject neoforge.mods.toml into JAR
        run: |
          JAR=$(find . -name "ninjago-*.jar" -path "*/build/libs/*" | head -1)
          TOML=$(find . -name "neoforge.mods.toml" -path "*/resources/*" | head -1)
          MCMETA=$(find . -name "pack.mcmeta" -path "*/resources/*" | head -1)
          ASSETS=$(find . -type d -name "assets" -path "*/resources/*" |
